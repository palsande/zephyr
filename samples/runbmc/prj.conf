# Default BMC services
CONFIG_RUNBMC_POWER_MANAGEMENT=y
CONFIG_RUNBMC_SENSOR_FRAMEWORK=y
CONFIG_RUNBMC_TELEMETRY=y

# Zephyr RTOS core
CONFIG_MULTITHREADING=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Thread configuration
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y

# Memory configuration
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=4096

# GPIO support
CONFIG_GPIO=y

# Software service
CONFIG_ASSERT=y

# Logging framework (backends configured per-board)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=1024
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=768

# Console and printk (backends configured per-board)
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# Note: Console backend (UART vs SWO) is configured in boards/*.conf
# - boards/qemu_riscv32.conf: UART console + shell
# - boards/stm32f4_disco.conf: SWO console (no shell)