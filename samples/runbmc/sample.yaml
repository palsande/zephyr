sample:
  description: RunBMC - Baseboard Management Controller implementation
    on Zephyr RTOS with multi-threaded architecture for power management,
    sensor monitoring, and telemetry collection
  name: RunBMC
common:
  min_ram: 16
  tags: bmc management sensors power telemetry shell
  integration_platforms:
    - qemu_riscv32
    - qemu_riscv64
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "RunBMC - Baseboard Management Controller"
      - "Initializing RunBMC..."
      - "Power management thread started"
      - "Sensor thread started"
      - "Telemetry thread started"
      - "All BMC threads started successfully"
      - "System ready"
tests:
  sample.runbmc.basic:
    tags: bmc shell threads
    platform_allow: qemu_riscv32 qemu_riscv64
    min_ram: 16
