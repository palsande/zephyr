# QEMU RISC-V32 Board-Specific Configuration

# UART Console for shell
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# Shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="runbmc:~$ "

# Logging - disable UART backend to prevent duplication
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_SHOW_COLOR=y

# Printk support
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# Force console to be ready early for banner
CONFIG_UART_CONSOLE_DEBUG_SERVER_HOOKS=y

# MCTP Transport - DISABLED on QEMU (only 1 UART conflicts with console)
# Test MCTP I2C simulation instead or use real hardware for UART testing
CONFIG_RUNBMC_MCTP=n
# CONFIG_RUNBMC_MCTP_UART=y
# CONFIG_UART_INTERRUPT_DRIVEN=y