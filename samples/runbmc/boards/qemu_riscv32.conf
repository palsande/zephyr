# QEMU RISC-V32 Board-Specific Configuration
# This overlay is automatically applied when building for qemu_riscv32

# Console Configuration - UART works well on QEMU
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# Shell Support - Interactive shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="runbmc:~$ "

# Logging via UART
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_SHOW_COLOR=y
CONFIG_LOG_BACKEND_FORMAT_TIMESTAMP=y

# Printk support
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y