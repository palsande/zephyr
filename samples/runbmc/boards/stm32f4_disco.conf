# STM32F4 Discovery Board-Specific Configuration
# This overlay is automatically applied when building for stm32f4_disco

# GPIO for LEDs (PD12-PD15)
CONFIG_GPIO=y

# Enable UART Console for interactive shell
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y

# Enable Shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="runbmc:~$ "

# Logging to UART
CONFIG_LOG_BACKEND_UART=y

# OPTIONAL: Keep SWO as secondary trace output
# prink enable configuration for STM32 Utility SWV using ITM
#CONFIG_LOG=y
#CONFIG_LOG_BACKEND_SWO=y
#CONFIG_TRACING=y
#CONFIG_PERCEPIO_TRACERECORDER=y
#CONFIG_PERCEPIO_TRC_START_MODE_START=y
#CONFIG_PERCEPIO_TRC_CFG_STREAM_PORT_ITM=y
#CONFIG_PERCEPIO_TRC_CFG_ITM_PORT=0

# Printk support
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y