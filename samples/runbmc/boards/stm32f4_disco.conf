# STM32F4 Discovery Board-Specific Configuration
# This overlay is automatically applied when building for stm32f4_disco

# GPIO for LEDs (PD12-PD15)
CONFIG_GPIO=y

# Enable UART Console for interactive shell
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y

# Enable Shell via UART
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="runbmc:~$ "

# Logging - disable UART backend to prevent duplication
# Shell backend will display logs
CONFIG_LOG_BACKEND_UART=n

# Printk support
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# MCTP Transport - I2C binding for STM32F4
CONFIG_RUNBMC_MCTP=y
CONFIG_RUNBMC_MCTP_I2C=y
CONFIG_I2C=y