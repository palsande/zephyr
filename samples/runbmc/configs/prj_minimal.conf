# RunBMC Firmware Framework - Minimal Configuration
# Use case: Resource-constrained single-MCU BMC without protocols
# Platforms: QEMU RISC-V, STM32F4 (basic monitoring only)

CONFIG_RUNBMC_POWER_MANAGEMENT=y
CONFIG_RUNBMC_SENSOR_FRAMEWORK=y
CONFIG_RUNBMC_TELEMETRY=y
CONFIG_RUNBMC_THERMAL_MANAGEMENT=n
CONFIG_RUNBMC_PLDM=n
CONFIG_RUNBMC_MCTP=n
CONFIG_RUNBMC_FRU=n
CONFIG_RUNBMC_REDFISH=n

# Minimal RAM footprint
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048