# RunBMC Firmware Framework - Full-Featured Configuration
# Use case: Enterprise BMC with all protocols and interfaces
# Platforms: QEMU RISC-V64, STM32F4 (if sufficient RAM)

CONFIG_RUNBMC_POWER_MANAGEMENT=y
CONFIG_RUNBMC_SENSOR_FRAMEWORK=y
CONFIG_RUNBMC_TELEMETRY=y
CONFIG_RUNBMC_THERMAL_MANAGEMENT=y
CONFIG_RUNBMC_PLDM=y
CONFIG_RUNBMC_MCTP=y
CONFIG_RUNBMC_FRU=y
CONFIG_RUNBMC_REDFISH=y

# Network for Redfish (requires platform with network)
# CONFIG_NETWORKING=y
# CONFIG_NET_TCP=y
# CONFIG_HTTP_SERVER=y
# CONFIG_JSON_LIBRARY=y

# Maximum resources
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384