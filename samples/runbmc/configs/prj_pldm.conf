# RunBMC Firmware Framework - Standard BMC Configuration
# Use case: Production BMC with PLDM protocol support
# Platforms: QEMU RISC-V32/64, STM32F4 Discovery

CONFIG_RUNBMC_POWER_MANAGEMENT=y
CONFIG_RUNBMC_SENSOR_FRAMEWORK=y
CONFIG_RUNBMC_TELEMETRY=y
CONFIG_RUNBMC_THERMAL_MANAGEMENT=y
CONFIG_RUNBMC_PLDM=y
CONFIG_RUNBMC_MCTP=y
CONFIG_RUNBMC_FRU=y
CONFIG_RUNBMC_REDFISH=n

# Larger stacks for protocol handling
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192